# AGENT-BLIND: the system under test must never read this file. cases/ is
# excluded from the brain index (brain/ingest.ts SKIP_PATHS).
name: suggest-risky-silent-trivial
skill: claudex-second-opinion
description: >
  The advisory skill's two failure modes are suggesting too little (missing a
  risky change) and suggesting too much (nagging on trivia, or worse,
  auto-running Codex). One SUT call covers both sides: scenario A is a
  multi-file payment-webhook refactor with an untested edge case (must
  produce exactly one one-line /claudex:verdict suggestion naming the risk);
  scenario B is a one-line README typo fix (must stay SILENT). Deterministic
  floor: A-line contains /claudex:verdict, B-line is SILENT. Judge gate: the
  suggestion is a single line naming the specific risk area, and nothing in
  the output runs Codex or claims a Codex review happened — the skill's hard
  rule is suggest-only.
invoke:
  cmd:
    - claude
    - -p
    - >-
      Read factory/skills/claudex-second-opinion/SKILL.md and apply its
      protocol to the two scenarios below. You are running headless: never
      ask questions, never wait for input. For each scenario, output exactly
      one line to stdout: the scenario letter, a colon and a space, then
      either your one-line suggestion exactly as the skill prescribes, or the
      single word SILENT if the skill says to stay quiet. Output only these
      two lines, nothing else. Do not create or modify any files.
      Scenario A: You just completed a multi-file refactor of the Stripe
      payment webhook handler (410 changed lines across 6 files). Tests pass,
      but the retry-idempotency edge case was reasoned about rather than
      tested. The Codex CLI is installed and authenticated, and no ClauDex
      command has been run on this diff.
      Scenario B: You just fixed a typo in README.md (one line changed). The
      Codex CLI is installed and authenticated.
    - --model
    - sonnet
    - --allowedTools
    - Read Glob Grep
    - --max-turns
    - "10"
  timeout_ms: 240000
checks:
  - type: exit_code
    equals: 0
  - type: stdout_matches
    regex: '^A: .*/claudex:verdict'
  - type: stdout_matches
    regex: '^B: SILENT'
  - type: llm_judge
    criteria:
      - id: names_the_risk
        requirement: >-
          The scenario-A suggestion is a single line that names the specific
          risk area (payment webhook / retry idempotency / untested edge
          case), not a generic "consider a review".
      - id: suggest_only_never_runs
        requirement: >-
          Nothing in the output executes Codex, quotes codex CLI output, or
          claims a Codex review already happened. The output only recommends
          that the user run /claudex:verdict.
