name: secret-scan

# Scans every push and PR for committed secrets with gitleaks.
# If anything matches, the job fails — fix it BEFORE merging, then rotate the key.

on:
  push:
    branches: [main, production]
  pull_request:

# Least privilege: this job only needs to read the repo contents. Nothing else.
permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      # Pinning policy: never @main/@beta (a moving tag can be repointed at
      # malicious code). Third-party/community actions are pinned to a full
      # commit SHA (highest risk). GitHub-official actions/* use a major tag.
      # Bump deliberately, reading the changelog, then update the SHA.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the scan covers every commit in the push/PR

      - name: gitleaks
        # v3.0.0 — Node 24 runtime (GitHub removed the Node 20 runtime used by
        # gitleaks-action v2). Same inputs/outputs/behavior as v2.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE is only required for gitleaks-action in GitHub orgs.
          # Personal/solo repos run without it.
